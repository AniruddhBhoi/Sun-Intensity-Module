<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sun Intensity Dashboard</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; }
      #top { display:flex; gap:20px; align-items:flex-start; }
      #metrics { display:flex; flex-direction:column; gap:12px; }
      .card { padding:12px; border:1px solid #ddd; border-radius:6px; min-width:180px; }
      canvas{ max-width:800px; }
    </style>
  </head>
  <body>
    <h1>Sun Intensity Dashboard</h1>
    <div id="top">
      <div id="metrics">
        <div class="card">
          <strong>Current Lux</strong>
          <div id="lux" style="font-size:28px; margin-top:6px">—</div>
        </div>
        <div class="card">
          <strong>Irradiance (W/m²)</strong>
          <div id="irr" style="margin-top:6px">—</div>
        </div>
        <div class="card">
          <strong>Est. Power (W)</strong>
          <div id="pwr" style="margin-top:6px">—</div>
        </div>
        <div class="card">
          <strong>Est. Energy / hr (Wh)</strong>
          <div id="eph" style="margin-top:6px">—</div>
        </div>
        <div class="card">
          <strong>Classification</strong>
          <div id="class" style="margin-top:6px">—</div>
        </div>
        <div class="card">
          <strong>Suggested Action</strong>
          <div id="action" style="margin-top:6px">—</div>
        </div>
      </div>
    </div>

    <h3>Live Graph (last 60 samples)</h3>
    <canvas id="chart" width="800" height="250"></canvas>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const socket = io();
      const luxEl = document.getElementById('lux');
      const classEl = document.getElementById('class');
      const actionEl = document.getElementById('action');
      const logEl = document.getElementById('log');

      const ctx = document.getElementById('chart').getContext('2d');
      const data = { labels: [], datasets: [{ label: 'Lux', data: [], borderColor: 'orange', tension: 0.2 }] };
      const chart = new Chart(ctx, { type: 'line', data, options: { animation:false, scales:{ y:{ beginAtZero:true } } } });


      function pushSample(ts, value) {
        data.labels.push(new Date(ts).toLocaleTimeString());
        data.datasets[0].data.push(value);
        if (data.labels.length > 60) { data.labels.shift(); data.datasets[0].data.shift(); }
        chart.update('none');
      }


      socket.on('lux', payload => {
        luxEl.textContent = payload.lux.toFixed(2);
        classEl.textContent = payload.classification;
        actionEl.textContent = payload.suggestedAction;
        document.getElementById('irr').textContent = (payload.irradiance || 0).toFixed(2);
          const power = (payload.estimatedPowerW || 0);
          document.getElementById('pwr').textContent = power.toFixed(2);
        pushSample(payload.timestamp, payload.lux);
      });

      socket.on('sys', msg => {
        logEl.textContent = new Date().toLocaleTimeString() + ' | ' + msg.message + '\n' + logEl.textContent;
      });
    </script>
  </body>
</html>
